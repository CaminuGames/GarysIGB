<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SYSTEM ERROR: 404</title>
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
	<style>
		:root {
			--error-red: #FF5555;
			--title-blue: #70CFFF;
			--black: #000000;
			--pixel-font: 'Press Start 2P', cursive;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: var(--black);
			color: var(--error-red);
			font-family: var(--pixel-font);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			height: 100vh;
			overflow: hidden;
			text-align: center;
			padding: 20px;
		}

		/* --- CRT SCANLINE EFFECT --- */
		body::before {
			content: '';
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: repeating-linear-gradient(
				0deg,
				rgba(255, 85, 85, 0.05),
				rgba(255, 85, 85, 0.05) 1px,
				transparent 1px,
				transparent 3px
			);
			pointer-events: none;
			z-index: 999;
		}

		.error-code {
			font-size: 40px;
			margin-bottom: 20px;
			animation: glitch 1s infinite;
		}

		.message {
			font-size: 12px;
			line-height: 2;
			max-width: 500px;
			margin-bottom: 40px;
		}

		.terminal-cursor {
			display: inline-block;
			width: 15px;
			height: 15px;
			background: var(--error-red);
			animation: blink 0.8s infinite;
			vertical-align: middle;
		}

		.btn-return {
			color: var(--black);
			background: var(--error-red);
			text-decoration: none;
			padding: 15px 25px;
			font-size: 10px;
			border: none;
			transition: all 0.3s ease;
			box-shadow: 4px 4px 0px var(--title-blue);
		}

		.btn-return:hover {
			transform: translate(-2px, -2px);
			box-shadow: 6px 6px 0px var(--title-blue);
			filter: brightness(1.2);
		}

		@keyframes glitch {
			0% { transform: translate(0); }
			20% { transform: translate(-3px, 2px); }
			40% { transform: translate(3px, -2px); }
			60% { transform: translate(-3px, -2px); }
			80% { transform: translate(3px, 2px); }
			100% { transform: translate(0); }
		}

		@keyframes blink {
			0%, 100% { opacity: 1; }
			50% { opacity: 0; }
		}
	</style>
</head>
<body>

	<div class="error-code">404</div>

	<div class="message">
		CRITICAL_FAILURE: SECTOR_NOT_FOUND <br>
		The coordinates you provided lead to a vacuum. <br>
		Gary's retrieval sensors are detecting 0% booty in this region. <br>
		<span class="terminal-cursor"></span>
	</div>

	<a href="index.html" class="btn-return">RETURN TO BASE</a>

	<script>
		// Subtle flickering effect to simulate a dying monitor
		setInterval(() => {
			document.body.style.opacity = Math.random() > 0.98 ? '0.7' : '1';
		}, 100);
	</script>

</body>
</html>
